<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/styles.css">
  <script src="scripts/scripts.js" defer></script>
  <title>phonebook</title>
</head>
<body>
<main class="phonebook">

  <aside class="sidebar">

    <header class="sidebar-header">

      <div class="sidebar-info">
        <h1>Contacts List</h1>
        <p class="saved-contacts"></p>
      </div>

      <div class="sidebar-actions">
        <button id="theme-button" aria-label="Toggle theme">
          <i data-lucide="moon"></i>
        </button>
        <button class="add-contact" type="button">Add contact</button>
      </div>

    </header>

    <div class="search">
      <label>
        <input type="text" id ="search" placeholder="search contacts">
      </label>
    </div>

    <nav class="contact-group" aria-label="Contacts"></nav>
  </aside>

  <section class="details hidden">

    <header class="details-header">

      <button class="secondary-button" id="back-button" type="button">
        <i data-lucide="arrow-left"></i>
        <span>Back</span>
      </button>

      <div class="contact-info">

        <div class="avatar avatar-large">

        </div>
        <div class="contact-summary">
          <h1 class="details-name">Bulbazavr V.</h1>
          <p class="details-added">Added 15 Feb</p>
        </div>

      </div>

      <div class="contact-actions">
        <button class="edit-contact" type="button">Edit</button>
        <button class="delete-contact" type="button">Delete</button>
      </div>

    </header>

    <div class="details-card">

      <div class="detail-row" id="phone">
        <p class="detail-label">Phone</p>
        <p class="detail-value details-phone"></p>
      </div>

      <div class="detail-row" id="email">
        <p class="detail-label">Email</p>
        <p class="detail-value details-email"></p>
      </div>

      <div class="detail-row" id="note">
        <p class="detail-label">Note</p>
        <p class="detail-value details-note"></p>
      </div>

    </div>

  </section>

  <form class="contact-form hidden">

    <header class="form-header">
      <h1 class="form-title">New Contact</h1>
    </header>

    <div class="form-body">
      <label>
        Name
        <input id="form-name" type="text">
      </label>
      <label>
        Phone
        <input id="form-phone" type="text">
      </label>
      <label>
        Email
        <input id="form-email" type="email">
      </label>
      <label>
        Note
        <textarea id="form-note"></textarea>
      </label>

    </div>

    <footer class="form-actions">
      <button class="save-contact" type="submit">
        Save
      </button>
      <button class="cancel-contact" type="button">
        Cancel
      </button>
    </footer>

  </form>

</main>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>
</body>
</html>
