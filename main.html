<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/styles.css">
  <script src="scripts/scripts.js" defer></script>
  <title>phonebook</title>
</head>
<body>
<main class="phonebook">

  <aside class="sidebar">

    <div class="sidebar-header">

      <div class="sidebar-info">
        <h1>Contacts List</h1>
        <p class="saved-contacts"></p>
      </div>

      <div class="sidebar-actions">
        <button class="add-contact" type="button">Add contact</button>
      </div>

    </div>

    <div class="search">
      <label>
        <input type="text" id ="search" placeholder="search contacts">
      </label>
    </div>

    <div class="contact-group">

    </div>
  </aside>

  <section class="details">

    <div class="details-header">
      <div class="contact-info">

        <div class="avatar avatar-large">

        </div>
        <div class="contact-summary">
          <h1 class="details-name">Bulbazavr V.</h1>
          <p class="details-added">Added 15 Feb</p>
        </div>

      </div>

      <div class="contact-actions">
        <button class="edit-contact" type="button">Edit</button>
        <button class="delete-contact" type="button">Delete</button>
      </div>

    </div>

    <div class="details-card">

      <div class="detail-row" id="phone">
        <p class="detail-label">Phone</p>
        <p class="detail-value details-phone"></p>
      </div>

      <div class="detail-row" id="email">
        <p class="detail-label">Email</p>
        <p class="detail-value details-email"></p>
      </div>

      <div class="detail-row" id="note">
        <p class="detail-label">Note</p>
        <p class="detail-value details-note"></p>
      </div>

    </div>

  </section>

</main>
</body>
</html>
